# Prometheus scrape configuration for the Cloud AI Platform.
#
# All targets below run as plain Docker Compose services (no Kubernetes
# cluster exists yet - that's Phase 8). kube-state-metrics is intentionally
# NOT enabled here: it queries the Kubernetes API server for object state
# (deployments/pods/etc.) and is meaningless without a real cluster to
# introspect. Its scrape job is left commented out below and will be
# uncommented once the platform actually runs on Kubernetes.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: "cloud-ai-backend"
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:8000"]

  # Deferred to Phase 8 (Kubernetes) - requires a real K8s API server.
  # - job_name: "kube-state-metrics"
  #   static_configs:
  #     - targets: ["kube-state-metrics:8080"]
