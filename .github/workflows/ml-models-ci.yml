name: ML Models CI

# Runs the ml-models pytest suite against its own throwaway MySQL database
# (cloud_ai_platform_ml_test), kept deliberately separate from the backend's
# cloud_ai_platform_test (see ml-models/tests/conftest.py) since these are
# two independently deployable projects that must never race on schema
# create/drop, even in CI. TensorFlow install makes this the slowest of the
# three CI workflows.
on:
  push:
    branches: [main]
    paths:
      - "ml-models/**"
      - ".github/workflows/ml-models-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "ml-models/**"
      - ".github/workflows/ml-models-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root_password
          MYSQL_DATABASE: cloud_ai_platform_ml_test
          MYSQL_USER: cloudai
          MYSQL_PASSWORD: cloudai_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      MYSQL_HOST: 127.0.0.1
      MYSQL_PORT: 3306
      MYSQL_USER: cloudai
      MYSQL_PASSWORD: cloudai_password
      MYSQL_DATABASE: cloud_ai_platform_ml_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: ml-models/requirements.txt

      - name: Install dependencies
        working-directory: ml-models
        run: pip install -r requirements.txt

      - name: Wait for MySQL
        run: |
          for i in $(seq 1 30); do
            mysqladmin ping -h127.0.0.1 -P3306 -ucloudai -pcloudai_password --silent && break
            echo "Waiting for MySQL... ($i/30)"
            sleep 2
          done

      - name: Run ml-models test suite
        working-directory: ml-models
        run: pytest -v
