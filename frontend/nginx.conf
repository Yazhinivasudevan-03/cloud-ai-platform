server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Reverse-proxy /api to the backend container so the frontend can call a
    # same-origin relative URL in production (see VITE_API_BASE_URL=/api/v1
    # in docker-compose.yml) - avoids CORS entirely for the containerized
    # deployment, unlike local dev where the frontend and backend run on
    # different ports.
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA routing: any path that isn't a real static file falls back to
    # index.html so React Router handles it client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
