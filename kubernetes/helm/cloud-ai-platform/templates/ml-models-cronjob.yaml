# Genuine scheduled retraining, gated behind mlModels.cronJob.enabled
# (defaults to false) - see kubernetes/base/ml-models-cronjob.yaml's header
# comment for why this now runs `retrain-all` (every deployment, real
# retraining) rather than `predict` for one hardcoded deployment ID.
{{- if .Values.mlModels.cronJob.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ml-models-retrain
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "cloud-ai-platform.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.mlModels.cronJob.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: ml-models-retrain
              image: "{{ .Values.mlModels.image.repository }}:{{ .Values.mlModels.image.tag }}"
              imagePullPolicy: {{ .Values.mlModels.image.pullPolicy }}
              args: ["retrain-all"]
              envFrom:
                - configMapRef:
                    name: backend-config
                - secretRef:
                    name: backend-secret
              volumeMounts:
                - name: ml-artifacts
                  mountPath: /app/lstm/artifacts
                  subPath: lstm
                - name: ml-artifacts
                  mountPath: /app/isolation_forest/artifacts
                  subPath: isolation_forest
                - name: ml-artifacts
                  mountPath: /app/random_forest/artifacts
                  subPath: random_forest
              resources:
                requests:
                  cpu: 250m
                  memory: 512Mi
                limits:
                  cpu: "1"
                  memory: 1Gi
          volumes:
            - name: ml-artifacts
              persistentVolumeClaim:
                claimName: ml-models-artifacts-pvc
{{- end }}
