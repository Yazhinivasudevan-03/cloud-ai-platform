# PLACEHOLDER VALUES by default (see values.yaml's `secrets` section) - for
# local/dev cluster use only, exactly like backend/.env.example elsewhere in
# this repo. Override every one of these via --set or a values file (never
# commit real secrets into values.yaml). A real deployment should prefer
# Sealed Secrets or the External Secrets Operator over a plain Helm-templated
# Secret entirely.
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "cloud-ai-platform.labels" . | nindent 4 }}
type: Opaque
stringData:
  SECRET_KEY: {{ .Values.secrets.secretKey | quote }}
  CLOUD_CREDENTIALS_ENCRYPTION_KEY: {{ .Values.secrets.cloudCredentialsEncryptionKey | quote }}
  MYSQL_USER: {{ .Values.secrets.mysqlUser | quote }}
  MYSQL_PASSWORD: {{ .Values.secrets.mysqlPassword | quote }}
  MYSQL_ROOT_PASSWORD: {{ .Values.secrets.mysqlRootPassword | quote }}
  SMTP_HOST: {{ .Values.secrets.smtpHost | quote }}
  SMTP_USER: {{ .Values.secrets.smtpUser | quote }}
  SMTP_PASSWORD: {{ .Values.secrets.smtpPassword | quote }}
  SMTP_FROM_ADDRESS: {{ .Values.secrets.smtpFromAddress | quote }}
  SLACK_WEBHOOK_URL: {{ .Values.secrets.slackWebhookUrl | quote }}
  TELEGRAM_BOT_TOKEN: {{ .Values.secrets.telegramBotToken | quote }}
  TELEGRAM_CHAT_ID: {{ .Values.secrets.telegramChatId | quote }}
