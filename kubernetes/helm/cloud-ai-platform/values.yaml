namespace: cloud-ai-platform

# Off by default - Docker Desktop Kubernetes' default CNI does not
# reliably enforce NetworkPolicy at all, so enabling this without a
# NetworkPolicy-enforcing CNI (Calico, Cilium, etc.) installed would look
# secured without being secured. See templates/network-policies.yaml.
networkPolicy:
  enabled: false

# --- Application images -----------------------------------------------
# Built locally (docker build) and referenced with pullPolicy: Never by
# default, since Docker Desktop Kubernetes shares the Docker Engine's image
# store. Point repository/tag at a real registry and set pullPolicy to
# IfNotPresent (or Always) for a non-local cluster.
backend:
  image:
    repository: cloud-ai-platform-backend
    tag: latest
    pullPolicy: Never
  replicaCount: 2
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits: { cpu: 500m, memory: 512Mi }
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 60
  # Off by default - the VerticalPodAutoscaler CRD/controller isn't part of
  # vanilla Kubernetes (unlike the HPA above) and most clusters, including
  # the Docker Desktop cluster this project verifies against, don't have it
  # installed. Enabling this on a cluster without the controller installed
  # will fail with an "unknown kind" error - only set to true after
  # installing https://github.com/kubernetes/autoscaler/tree/master/vertical-pod-autoscaler.
  vpa:
    enabled: false
    minAllowedCPU: 100m
    minAllowedMemory: 256Mi
    maxAllowedCPU: "1"
    maxAllowedMemory: 1Gi

frontend:
  image:
    repository: cloud-ai-platform-frontend
    tag: latest
    pullPolicy: Never
  replicaCount: 2
  resources:
    requests: { cpu: 50m, memory: 64Mi }
    limits: { cpu: 200m, memory: 128Mi }

mysql:
  image: mysql:8.0
  storage: 5Gi
  resources:
    requests: { cpu: 250m, memory: 512Mi }
    limits: { cpu: "1", memory: 1Gi }
  backup:
    enabled: true
    storage: 5Gi
    schedule: "0 2 * * *" # daily at 02:00
    retentionDays: 14

ingress:
  enabled: true
  className: nginx
  host: cloud-ai-platform.local
  # Off by default - requires cert-manager (https://cert-manager.io) to be
  # installed in the cluster first, same reasoning as backend.vpa.enabled:
  # a ClusterIssuer/Certificate are CRDs, not built-in Kubernetes APIs, so
  # enabling this on a cluster without cert-manager installed fails with an
  # "unknown kind" error. Uses cert-manager's "selfsigned" issuer - a real,
  # working TLS certificate, just not one a browser will trust by default,
  # since no real public domain is available to obtain a trusted cert for
  # cloud-ai-platform.local.
  tls:
    enabled: false
    secretName: cloud-ai-platform-tls

# --- Config (non-secret) ------------------------------------------------
config:
  appName: "Cloud AI Platform"
  appEnv: "production"
  debug: false
  corsOrigins: "http://localhost:3000"
  alertEvaluationIntervalMinutes: 5
  optimizationEvaluationIntervalMinutes: 60
  rateLimitLogin: "5/minute"
  rateLimitRegister: "10/hour"
  cloudSyncIntervalMinutes: 15
  cloudSyncLookbackMinutes: 15

# --- Secrets (PLACEHOLDER VALUES - see kubernetes/base/secret-backend.yaml's
# header comment; the same disclosure applies here) ----------------------
secrets:
  secretKey: "CHANGE-ME-64-char-random-secret-for-jwt-signing-before-real-use"
  cloudCredentialsEncryptionKey: "CHANGE-ME-a-different-random-secret-than-secretKey"
  mysqlUser: "cloudai"
  mysqlPassword: "CHANGE-ME-cloudai-password"
  mysqlRootPassword: "CHANGE-ME-root-password"
  mysqlDatabase: "cloud_ai_platform"
  authMysqlDatabase: "cloud_ai_auth"
  smtpHost: ""
  smtpUser: ""
  smtpPassword: ""
  smtpFromAddress: ""
  slackWebhookUrl: ""
  telegramBotToken: ""
  telegramChatId: ""

# --- Monitoring stack ----------------------------------------------------
monitoring:
  prometheus:
    enabled: true
    image: prom/prometheus:v2.54.1
    storage: 5Gi
  grafana:
    enabled: true
    image: grafana/grafana:11.3.0
    adminUser: admin
    adminPassword: admin # CHANGE ME
    storage: 2Gi
  nodeExporter:
    enabled: true
    image: prom/node-exporter:v1.8.2
  kubeStateMetrics:
    enabled: true
    image: registry.k8s.io/kube-state-metrics/kube-state-metrics:v2.13.0

# --- ML pipeline (batch, off by default - see values below) --------------
mlModels:
  image:
    repository: cloud-ai-platform-ml-models
    tag: latest
    pullPolicy: Never
  storage: 2Gi
  # A one-off Job only renders when explicitly enabled, mirroring
  # docker-compose.yml's `profiles: ["ml"]` treatment of this same service -
  # it is not part of the always-on install.
  job:
    enabled: false
    deploymentId: 1
    podId: 1
  cronJob:
    enabled: false
    schedule: "0 3 * * *"
