# Prometheus needs cluster-wide read access to discover scrape targets
# (nodes for kubelet/cAdvisor, pods for annotation-based discovery) and to
# proxy the kubelet's /metrics/cadvisor endpoint - hence a ClusterRole/
# ClusterRoleBinding rather than a namespaced Role.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: cloud-ai-platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/proxy", "nodes/metrics", "services", "endpoints", "pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["/metrics", "/metrics/cadvisor"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: cloud-ai-platform
