# A DaemonSet, not a Deployment: node-exporter must run exactly one
# instance per node to report that node's own hardware/OS metrics -
# Deployment's replica count has no relationship to node count, so it's the
# wrong primitive here (the one thing Docker Compose's single node-exporter
# container couldn't model at all, since Compose has no concept of "nodes").
# hostNetwork/hostPID plus mounting the host's /proc and /sys are what let
# it actually see the node's real metrics instead of its own container's.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-exporter
  namespace: cloud-ai-platform
  labels:
    app: node-exporter
spec:
  selector:
    matchLabels:
      app: node-exporter
  template:
    metadata:
      labels:
        app: node-exporter
    spec:
      hostNetwork: true
      hostPID: true
      containers:
        - name: node-exporter
          image: prom/node-exporter:v1.8.2
          args:
            - "--path.procfs=/host/proc"
            - "--path.sysfs=/host/sys"
            - "--path.rootfs=/host/root"
          ports:
            - containerPort: 9100
              hostPort: 9100
          volumeMounts:
            - name: proc
              mountPath: /host/proc
              readOnly: true
            - name: sys
              mountPath: /host/sys
              readOnly: true
            - name: root
              mountPath: /host/root
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      tolerations:
        - effect: NoSchedule
          operator: Exists
      volumes:
        - name: proc
          hostPath:
            path: /proc
        - name: sys
          hostPath:
            path: /sys
        - name: root
          hostPath:
            path: /
