# PLACEHOLDER VALUES - for local/dev cluster use only.
#
# This is a plain Kubernetes Secret (base64-encoded, NOT encrypted at rest
# unless the cluster has encryption-at-rest configured) checked into git
# with obviously-fake values, exactly like backend/.env.example elsewhere in
# this repo - it is a template, not a credential. A real deployment should
# never commit actual secrets this way; use Sealed Secrets, the External
# Secrets Operator (backed by a cloud KMS/secrets manager), or at minimum
# `kubectl create secret ... --dry-run=client -o yaml` piped from a
# not-committed source, then apply that instead of this file.
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: cloud-ai-platform
type: Opaque
stringData:
  SECRET_KEY: "CHANGE-ME-64-char-random-secret-for-jwt-signing-before-real-use"
  CLOUD_CREDENTIALS_ENCRYPTION_KEY: "CHANGE-ME-a-different-random-secret-than-SECRET_KEY"
  MYSQL_USER: "cloudai"
  MYSQL_PASSWORD: "CHANGE-ME-cloudai-password"
  MYSQL_ROOT_PASSWORD: "CHANGE-ME-root-password"
  SMTP_HOST: ""
  SMTP_USER: ""
  SMTP_PASSWORD: ""
  SMTP_FROM_ADDRESS: ""
  SLACK_WEBHOOK_URL: ""
  TELEGRAM_BOT_TOKEN: ""
  TELEGRAM_CHAT_ID: ""
