# Non-secret backend configuration. Secret values (DB password, JWT signing
# key, SMTP/Slack/Telegram credentials) live in secret-backend.yaml instead -
# never mixed into the same object as plaintext config.
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: cloud-ai-platform
data:
  APP_NAME: "Cloud AI Platform"
  APP_ENV: "production"
  DEBUG: "false"
  API_V1_PREFIX: "/api/v1"
  MYSQL_HOST: "mysql"
  MYSQL_PORT: "3306"
  MYSQL_DATABASE: "cloud_ai_platform"
  AUTH_MYSQL_DATABASE: "cloud_ai_auth"
  ALGORITHM: "HS256"
  ACCESS_TOKEN_EXPIRE_MINUTES: "30"
  REFRESH_TOKEN_EXPIRE_DAYS: "7"
  CORS_ORIGINS: "http://localhost:3000"
  RATE_LIMIT_LOGIN: "5/minute"
  RATE_LIMIT_REGISTER: "10/hour"
  CLOUD_SYNC_INTERVAL_MINUTES: "15"
  CLOUD_SYNC_LOOKBACK_MINUTES: "15"
  ALERT_EVALUATION_INTERVAL_MINUTES: "5"
  OPTIMIZATION_EVALUATION_INTERVAL_MINUTES: "60"
  SMTP_PORT: "587"
  SMTP_USE_TLS: "true"
