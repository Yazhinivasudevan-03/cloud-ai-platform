# The image was built with VITE_API_BASE_URL=/api/v1 baked in (Vite inlines
# build-time env vars into the JS bundle - see frontend/Dockerfile), and its
# nginx.conf proxies /api/ to http://backend:8000/api/. Since backend-service.yaml
# names the Service "backend", this exact image needs zero changes between
# Docker Compose and Kubernetes.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: cloud-ai-platform
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: cloud-ai-platform-frontend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
