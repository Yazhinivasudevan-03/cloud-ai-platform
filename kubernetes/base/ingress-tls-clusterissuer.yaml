# NOT included in kustomization.yaml's resources list, deliberately - same
# reasoning as backend-vpa.yaml: ClusterIssuer/Certificate are cert-manager
# CRDs, not built-in Kubernetes APIs, so bundling this into the default
# `kubectl apply -k` would fail with an "unknown kind" error on any
# cluster without cert-manager (https://cert-manager.io) installed,
# including the Docker Desktop cluster docs/PHASE_8.md verifies against.
#
# Apply explicitly, only after installing cert-manager:
#   kubectl apply -f kubernetes/base/ingress-tls-clusterissuer.yaml
#   kubectl apply -f kubernetes/base/ingress-tls.yaml   # replaces the plain-HTTP Ingress
#
# Uses cert-manager's "selfsigned" issuer - a genuinely working TLS
# certificate, just not one a browser will trust by default, since no
# real public domain is available to obtain a trusted cert for
# cloud-ai-platform.local.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: cloud-ai-platform-selfsigned
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: cloud-ai-platform-tls
  namespace: cloud-ai-platform
spec:
  secretName: cloud-ai-platform-tls
  dnsNames:
    - cloud-ai-platform.local
  issuerRef:
    name: cloud-ai-platform-selfsigned
    kind: ClusterIssuer
