apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: cloud-ai-platform

resources:
  - namespace.yaml
  - configmap-backend.yaml
  - secret-backend.yaml
  - mysql-init-configmap.yaml
  - mysql-pvc.yaml
  - mysql-backup-pvc.yaml
  - mysql-backup-cronjob.yaml
  - prometheus-pvc.yaml
  - grafana-pvc.yaml
  - ml-models-pvc.yaml
  # persistent-volume-example.yaml is intentionally NOT included here - see
  # that file's own header comment for why.
  - mysql-deployment.yaml
  - mysql-service.yaml
  - backend-deployment.yaml
  - backend-service.yaml
  - backend-hpa.yaml
  - frontend-deployment.yaml
  - frontend-service.yaml
  - ingress.yaml
  - prometheus-rbac.yaml
  - prometheus-configmap.yaml
  - prometheus-deployment.yaml
  - prometheus-service.yaml
  - node-exporter-daemonset.yaml
  - kube-state-metrics.yaml
  - grafana-configmap.yaml
  - grafana-deployment.yaml
  - grafana-service.yaml
  # ml-models-job.yaml / ml-models-cronjob.yaml are intentionally NOT
  # included here - they're one-off/scheduled batch workloads applied
  # explicitly when needed (`kubectl apply -f ml-models-job.yaml`), not part
  # of the always-on stack, mirroring the `profiles: ["ml"]` treatment this
  # same service gets in docker-compose.yml.
  # backend-vpa.yaml is also intentionally NOT included here - it requires
  # the VerticalPodAutoscaler CRD/controller, which isn't part of vanilla
  # Kubernetes (unlike the HPA above) and isn't installed in the Docker
  # Desktop cluster this project verifies against - see that file's own
  # header comment for the explicit apply command.
  # ingress-tls-clusterissuer.yaml / ingress-tls.yaml are also intentionally
  # NOT included here - they require cert-manager, likewise not part of
  # vanilla Kubernetes - see ingress-tls-clusterissuer.yaml's own header
  # comment for the explicit apply command (they replace the plain-HTTP
  # ingress.yaml above once cert-manager is installed).
  # network-policies.yaml is also intentionally NOT included here - for a
  # different reason than the CRD-based files above: Docker Desktop
  # Kubernetes' default CNI does not reliably enforce NetworkPolicy at all,
  # so applying it by default here could look secured without being
  # secured - see that file's own header comment for the explicit apply
  # command, once a NetworkPolicy-enforcing CNI is confirmed installed.
