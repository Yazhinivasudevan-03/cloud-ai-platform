# Genuine scheduled retraining, not just re-prediction against a stale
# model - addresses a real gap the technical audit found: this job
# previously only ever re-ran `predict` for a single hardcoded
# --deployment-id, never retraining, and never touching any other
# deployment. `retrain-all` (run_pipeline.py) retrains + predicts all 3
# models for every deployment with enough resource_usage history,
# tolerating individual failures the same way the backend's own
# scheduled batch jobs do (AlertEvaluationService.evaluate_all(), etc.).
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ml-models-retrain
  namespace: cloud-ai-platform
spec:
  schedule: "0 3 * * *" # daily at 03:00
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: ml-models-retrain
              image: cloud-ai-platform-ml-models:latest
              imagePullPolicy: Never
              args: ["retrain-all"]
              envFrom:
                - configMapRef:
                    name: backend-config
                - secretRef:
                    name: backend-secret
              volumeMounts:
                - name: ml-artifacts
                  mountPath: /app/lstm/artifacts
                  subPath: lstm
                - name: ml-artifacts
                  mountPath: /app/isolation_forest/artifacts
                  subPath: isolation_forest
                - name: ml-artifacts
                  mountPath: /app/random_forest/artifacts
                  subPath: random_forest
              resources:
                requests:
                  cpu: 250m
                  memory: 512Mi
                limits:
                  cpu: "1"
                  memory: 1Gi
          volumes:
            - name: ml-artifacts
              persistentVolumeClaim:
                claimName: ml-models-artifacts-pvc
