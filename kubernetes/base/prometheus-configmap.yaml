# Kubernetes-native scrape config using kubernetes_sd_configs - a real
# rewrite from monitoring/prometheus/prometheus.yml's Docker Compose static
# target list, not a copy-paste. Two changes worth calling out:
#
# 1. kube-state-metrics is enabled for real here (it was commented out
#    since Phase 3 - it needs a Kubernetes API server to introspect, which
#    only exists from this phase onward).
# 2. cAdvisor is no longer a standalone container: real Kubernetes nodes
#    already expose container metrics through the kubelet's own
#    /metrics/cadvisor endpoint, so the "kubernetes-nodes-cadvisor" job
#    scrapes that directly via the Kubernetes API server proxy, using this
#    pod's own ServiceAccount token for auth. Running a separate cAdvisor
#    DaemonSet on top of that would be redundant.
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: cloud-ai-platform
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: "prometheus"
        static_configs:
          - targets: ["localhost:9090"]

      - job_name: "kubernetes-nodes-cadvisor"
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/${1}/proxy/metrics/cadvisor

      - job_name: "kubernetes-node-exporter"
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - source_labels: [__meta_kubernetes_node_address_InternalIP]
            target_label: __address__
            replacement: "${1}:9100"
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)

      - job_name: "kube-state-metrics"
        static_configs:
          - targets: ["kube-state-metrics.cloud-ai-platform.svc.cluster.local:8080"]

      # Any pod can opt in by setting these three annotations - the backend
      # Deployment already does (see backend-deployment.yaml's pod template).
      - job_name: "kubernetes-pods"
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: kubernetes_namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: kubernetes_pod_name
