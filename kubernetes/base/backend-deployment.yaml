# Note on image: built locally via `docker build` and referenced here with
# imagePullPolicy: Never, since Docker Desktop's Kubernetes shares the same
# image store as its Docker Engine - no registry push needed for local/dev
# use. A real deployment would push cloud-ai-platform-backend to a registry
# (ECR/GCR/ACR/Docker Hub), use a versioned tag instead of :latest, and
# imagePullPolicy: IfNotPresent or Always.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: cloud-ai-platform
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
      annotations:
        # Scraped by Prometheus via pod-annotation-based service discovery -
        # see monitoring/prometheus-configmap.yaml's "cloud-ai-backend" job.
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      initContainers:
        - name: migrate
          image: cloud-ai-platform-backend:latest
          imagePullPolicy: Never
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secret
      containers:
        - name: backend
          image: cloud-ai-platform-backend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secret
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health/db
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
